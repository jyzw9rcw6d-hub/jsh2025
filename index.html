<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="日本高血圧学会ガイドラインに基づいた高血圧専門問題集。専門医試験レベルから超高難度の問題を網羅。">
    <title>JSH2025 高血圧専門問題集</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="header-content">
            <h1>
                日本高血圧学会ガイドライン参考<br>
                <span class="subtitle">高血圧専門問題集</span>
            </h1>
            <p class="tagline">
                JSH2025参考<br>
                専門医試験レベル～超高難度
            </p>
        </div>
    </header>

    <main>
        <div id="information" class="info-box">
            <p id="mode"></p>
            <p id="number"></p>
        </div>

        <div id="test" class="test-container">
            <h2>開始ボタンを押してください</h2>
        </div>

        <div id="control" class="control-buttons">
            <button id="start" class="btn btn-primary">開始</button>
            <button id="next" class="btn btn-secondary">次の問題</button>
            <button id="review" class="btn btn-secondary">間違えた問題を復習</button>
        </div>

        <div id="result" class="result-container"></div>
    </main>

    <footer>
        <p>Hypertension Question Bank</p>
        <p>&copy; 2025 高血圧専門問題集 | JSH2025</p>
    </footer>

    <script src="js/questions.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
